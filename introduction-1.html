<!DOCTYPE html>
<html>
<head>
    <title>Stickman Go</title>
    <style>
        body {
            margin:0;
            overflow:hidden;
            display:flex;
        }

        canvas {
            user-select: none;
            -webkit-user-select: none;
            z-index:0;
        }

        #heart {
            z-index:1;
            position:absolute;
        }

        #score {
            position:absolute;
            font-size:19px;
            top:5px;
        }

        #start {
            position:absolute;
            top:50%;
            left:50%;
            transform:translate(-50%,-50%);
        }
    </style>
    <script>
        function start() {
            document.getElementById("start").style.visibility = "hidden";
            var boxes = [];
            var canvas, ctx, x, y, hearts = 9, scores = 0;
            var points = [];
            var isLegsExtended = true; // To toggle legs animation
            var legAnimationFrame = 0; // Animation frame for legs
            canvas = document.getElementById('canvas');
            ctx = canvas.getContext('2d');
            hearts = 9;
            canvas.width = innerWidth;
            canvas.height = innerHeight;

            x = canvas.width / 2;
            y = canvas.height / 1.5;

            canvas.addEventListener("touchmove", (e) => {
                x = e.changedTouches[0].clientX;
                if (x < 30) {
                    x = 25;
                }
                if (x > canvas.width - 30) {
                    x = canvas.width - 30;
                }
            });

            Animate();
            var box_push = setInterval(function () {
                boxes.push({
                    bx: (Math.random() * (canvas.width / 1.5)),
                    by: -50,
                    collided: false,
                    width: (Math.random() * ((canvas.width / 2) - 50) + 50)
                });
            }, 1000);
            var points_push = setInterval(function () {
                points.push({
                    collided: false,
                    px: (Math.random() * (canvas.width - 20)),
                    py: -50,
                    opacity: 1
                })
            }, 100);
            var c = 4;

            function Draw() {
                var btn = document.getElementById("start");
                btn.textContent = "Restart";
                btn.style.visibility = "hidden";
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                ctx.beginPath();
                ctx.fillStyle = '#fff';
                ctx.rect(0, 0, canvas.width, canvas.height);
                ctx.fill();
                ctx.closePath();

                // Draw stickman
                ctx.beginPath();
                ctx.strokeStyle = "#000";
                ctx.lineWidth = 2;
                // Head
                ctx.arc(x, y - 50, 10, 0, Math.PI * 2);
                // Body
                ctx.moveTo(x, y - 40);
                ctx.lineTo(x, y);
                // Arms
                ctx.moveTo(x, y - 35);
                ctx.lineTo(x - 10, y - 25);
                ctx.moveTo(x, y - 35);
                ctx.lineTo(x + 10, y - 25);
                // Legs
                // Running animation for legs
                ctx.moveTo(x, y);
                if (isLegsExtended) {
                    // Left leg
                    ctx.lineTo(x - 5, y + 15);
                    // Right leg
                    ctx.moveTo(x, y);
                    ctx.lineTo(x + 5, y + 15);
                } else {
                    // Left leg
                    ctx.lineTo(x - 10, y + 15);
                    // Right leg
                    ctx.moveTo(x, y);
                    ctx.lineTo(x + 10, y + 15);
                }
                ctx.stroke();
                ctx.closePath();

                // Update leg animation frame
                legAnimationFrame++;
                if (legAnimationFrame % 10 === 0) { // Change leg position every 10 frames
                    isLegsExtended = !isLegsExtended;
                }

                ctx.beginPath();
                for (let i = 0; i < boxes.length; i++) {
                    let box = boxes[i];
                    var image = new Image();
                    image.src = 'https://i.imgur.com/99JWIaj.jpeg';
                    ctx.drawImage(image, box.bx, box.by, box.width, 15);

                    if (hearts <= 0) {
                        clearInterval(box_push);
                    }
                    if (c < 8) {
                        c += 0.0005;
                    }
                    if (hearts > 0) {
                        box.by += c;
                    } else if (hearts <= 0) {
                        btn.style.visibility = "visible";
                    }
                    if (box.by + 15 >= y - 23 && box.by <= y + 23 && box.bx + box.width >= x - 23 && box.bx <= x + 23 && !box.collided) {
                        box.collided = true;
                        hearts--;
                        drawHeart(hearts);
                    }
                    if (box.by > canvas.height) {
                        boxes.splice(i, 1);
                        i--;
                    }

                }

                ctx.closePath();
                ctx.beginPath();
                for (let j = 0; j < points.length; j++) {
                    var point = points[j];

                    ctx.beginPath();
                    ctx.strokeStyle = '#000';
                    ctx.lineWidth = 2;
                    ctx.arc(point.px, point.py, 8, 0, Math.PI * 2);
                    ctx.stroke();
                    if (hearts <= 0) {
                        clearInterval(points_push);
                    } else {
                        point.py += c;
                    }
                    if (point.py + 8 >= y - 25 && point.py <= y + 25 && point.px + 8 >= x - 25 && point.px <= x + 25 && !point.collided) {
                        point.collided = true;
                        points.splice(j, 1);
                        j--;
                        scores += 2;
                        sc();
                    }
                }

                ctx.closePath();
            }

            function drawHeart(h = 9) {
                const heart = document.getElementById("heart")
                heart.textContent = "";
                for (let i = 0; i < h; i++) {
                    heart.textContent += "❤️";
                }
            }
            drawHeart();

            function sc() {
                const score = document.getElementById("score");
                score.style.left = (canvas.width - 100) + "px";
                score.textContent = "Score: " + scores;
            }
            sc();

            function Animate() {
                Draw();
                requestAnimationFrame(Animate);
            }
        }
    </script>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="heart" style="margin-left:5px;margin-top:5px;font-size:20px"></div>
<div id="score"></div>
<button onclick="start()" id="start">Start game</button>
</body>
</html>
